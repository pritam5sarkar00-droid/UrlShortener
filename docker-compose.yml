version: "3.9"

services:
  postgres:
    image: postgres:16-alpine
    container_name: url-shortener-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-shortener}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-shortener_pass}
      POSTGRES_DB: ${POSTGRES_DB:-url_shortener}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./backend/db/migrations:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-shortener}"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis/redis-stack:latest
    container_name: url-shortener-redis
    restart: unless-stopped
    # No TTL on cache entries by design (see cache.service.js) - allkeys-lru
    # is what actually evicts cold entries instead of noeviction silently
    # rejecting writes once memory fills up.
    command: redis-stack-server --maxmemory 256mb --maxmemory-policy allkeys-lru
    ports:
      - "6379:6379"
      - "8001:8001" # RedisInsight UI - handy for inspecting the cache + shortcode shield
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 10

  rabbitmq:
    image: rabbitmq:3-management-alpine
    container_name: url-shortener-rabbitmq
    restart: unless-stopped
    ports:
      - "5672:5672"
      - "15672:15672" # management UI - http://localhost:15672
    environment:
      RABBITMQ_DEFAULT_USER: ${RABBITMQ_USER:-shortener}
      RABBITMQ_DEFAULT_PASS: ${RABBITMQ_PASS:-shortener_pass}
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "-q", "ping"]
      interval: 10s
      timeout: 10s
      retries: 10

  api:
    build:
      context: ./backend
    container_name: url-shortener-api
    restart: unless-stopped
    command: npm run dev
    env_file: .env
    environment:
      SERVICE_NAME: api
      SNOWFLAKE_WORKER_ID: 1
      FRONTEND_URL: http://localhost:5173
    ports:
      - "3000:3000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    volumes:
      - ./backend:/app
      - /app/node_modules

  worker:
    build:
      context: ./backend
    container_name: url-shortener-worker
    restart: unless-stopped
    command: npm run worker:dev
    env_file: .env
    environment:
      SERVICE_NAME: worker
      SNOWFLAKE_WORKER_ID: 2
    ports:
      - "9100:9100" # worker isn't an HTTP server otherwise - this is just for Prometheus
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    volumes:
      - ./backend:/app
      - /app/node_modules

  prometheus:
    image: prom/prometheus:latest
    container_name: url-shortener-prometheus
    restart: unless-stopped
    volumes:
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    ports:
      - "9090:9090" # Prometheus UI - http://localhost:9090
    depends_on:
      - api
      - worker

  grafana:
    image: grafana/grafana:latest
    container_name: url-shortener-grafana
    restart: unless-stopped
    environment:
      GF_SECURITY_ADMIN_USER: ${GRAFANA_USER:-admin}
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_PASSWORD:-admin}
    volumes:
      - grafana_data:/var/lib/grafana
      - ./monitoring/grafana/provisioning:/etc/grafana/provisioning:ro
    ports:
      - "3001:3000" # Grafana UI - http://localhost:3001 (3000 is already the api)
    depends_on:
      - prometheus

  # frontend service comes back in Phase 8, once backend/frontend actually has
  # a package.json + Dockerfile - leaving it in here now would just break
  # `docker-compose up --build`.

  frontend:
    build:
      context: ./frontend
    container_name: url-shortener-frontend
    restart: unless-stopped
    environment:
      VITE_API_URL: http://localhost:3000/api
    ports:
      - "5173:5173"
    depends_on:
      - api
    volumes:
      - ./frontend:/app
      - /app/node_modules

volumes:
  postgres_data:
  redis_data:
  prometheus_data:
  grafana_data:
